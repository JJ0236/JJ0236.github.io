<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scissor Lattice Generator — joshhicks.info</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --moss-dark:   #3A4A2C;
      --moss-mid:    #5A7040;
      --moss-light:  #8FAF6E;
      --soil-dark:   #5C3D1E;
      --chalk:       #F8F4EE;
      --bg:          #141810;
      --bg2:         #191E12;
      --border:      #252E1A;
      --text:        #D4CDB8;
      --muted:       #7A7560;
      --accent:      #8FAF6E;
      --panel-w:     264px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Tool header ────────────────────────────────────── */
    .tool-header {
      height: 48px;
      background: var(--moss-dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      z-index: 10;
    }
    .tool-header-back {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #8A8070;
      font-size: 0.82rem;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.2s;
    }
    .tool-header-back:hover { color: #D9D0C1; }
    .tool-header-back svg { width: 14px; height: 14px; flex-shrink: 0; }
    .tool-header-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--moss-light);
      letter-spacing: 0.04em;
    }
    .tool-header-site { font-size: 0.68rem; color: #6B6055; letter-spacing: 0.06em; }

    /* ── Body layout ────────────────────────────────────── */
    .body-wrap { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    /* ── Sidebar ────────────────────────────────────────── */
    .sidebar {
      width: var(--panel-w);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
      scrollbar-width: thin;
      scrollbar-color: #2a3420 transparent;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: #2a3420; border-radius: 2px; }

    .panel { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
    .panel:last-child { border-bottom: none; }
    .panel-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.64rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* Segmented control */
    .seg {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .seg button {
      flex: 1;
      padding: 5px 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .seg button + button { border-left: 1px solid var(--border); }
    .seg button.active {
      background: var(--moss-dark);
      color: var(--moss-light);
    }

    /* Labeled row */
    .ctrl-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .ctrl-label {
      font-size: 0.75rem;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
    }
    .ctrl-hint {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      margin-top: -4px;
      margin-bottom: 6px;
    }
    .ctrl-input {
      width: 72px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 7px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      color: var(--text);
      text-align: right;
      outline: none;
      transition: border-color 0.15s;
    }
    .ctrl-input:focus { border-color: var(--moss-light); }

    /* Three-way segmented for end shape */
    .seg3 { margin-bottom: 8px; }

    /* Export button */
    .export-btn {
      width: 100%;
      padding: 9px;
      background: var(--moss-dark);
      border: 1px solid var(--moss-mid);
      border-radius: 6px;
      color: var(--moss-light);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.74rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      margin-top: 4px;
    }
    .export-btn:hover { background: var(--moss-mid); color: #fff; }
    .export-btn:disabled { opacity: 0.4; cursor: default; }

    /* Info strip */
    .info-strip {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      line-height: 1.7;
      margin-top: 8px;
    }

    /* Vault section — hidden by default */
    .vault-section { display: none; }
    .vault-section.visible { display: block; }

    /* ── Viewport ───────────────────────────────────────── */
    .viewport-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }
    #three-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .viewport-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.68rem;
      color: rgba(255,255,255,0.2);
      pointer-events: none;
      white-space: nowrap;
    }
    .viewport-stats {
      position: absolute;
      top: 10px;
      right: 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      color: rgba(255,255,255,0.25);
      text-align: right;
      pointer-events: none;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<header class="tool-header">
  <a href="/projects/" class="tool-header-back">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9,1 4,7 9,13"/>
    </svg>
    Projects
  </a>
  <span class="tool-header-title">Scissor Lattice</span>
  <span class="tool-header-site">joshhicks.info</span>
</header>

<div class="body-wrap">

  <!-- ── Settings sidebar ────────────────────────────── -->
  <aside class="sidebar">

    <div class="panel">
      <div class="panel-title">Mode</div>
      <div class="seg" id="seg-mode">
        <button class="active" data-val="flat">Flat</button>
        <button data-val="vault">Barrel Vault</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Units</div>
      <div class="seg" id="seg-units">
        <button class="active" data-val="mm">mm</button>
        <button data-val="in">in</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Coverage Area</div>
      <div class="ctrl-row">
        <label class="ctrl-label" for="inp-width">Width</label>
        <input class="ctrl-input" id="inp-width" type="number" min="1" step="1" value="400" />
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label" for="inp-height">Height</label>
        <input class="ctrl-input" id="inp-height" type="number" min="1" step="1" value="400" />
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Lattice Density</div>
      <div class="ctrl-row">
        <label class="ctrl-label" for="inp-gap">Opening Size</label>
        <input class="ctrl-input" id="inp-gap" type="number" min="5" step="1" value="50" />
      </div>
      <div class="ctrl-hint" id="cell-hint">— cells</div>
    </div>

    <div class="panel">
      <div class="panel-title">Bar Settings</div>
      <div class="ctrl-row">
        <label class="ctrl-label" for="inp-barw">Bar Width</label>
        <input class="ctrl-input" id="inp-barw" type="number" min="2" step="0.5" value="15" />
      </div>
      <div class="panel-title" style="margin-top:4px;">End Shape</div>
      <div class="seg seg3" id="seg-end">
        <button class="active" data-val="square">Square</button>
        <button data-val="round">Round</button>
        <button data-val="tab">Tab</button>
      </div>
      <div class="panel-title" style="margin-top:4px;">Bars per Direction</div>
      <div class="seg" id="seg-count">
        <button class="active" data-val="1">1</button>
        <button data-val="2">2</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Pivot Holes</div>
      <div class="ctrl-row">
        <label class="ctrl-label" for="inp-hole">Hole Diameter</label>
        <input class="ctrl-input" id="inp-hole" type="number" min="1" step="0.5" value="6" />
      </div>
    </div>

    <div class="panel vault-section" id="vault-panel">
      <div class="panel-title">Barrel Vault</div>
      <div class="ctrl-row">
        <label class="ctrl-label" for="inp-arc">Arc Height</label>
        <input class="ctrl-input" id="inp-arc" type="number" min="1" step="1" value="100" />
      </div>
      <div class="ctrl-hint" id="vault-hint">— radius</div>
    </div>

    <div class="panel">
      <div class="panel-title">SVG Export Layout</div>
      <div class="ctrl-row">
        <label class="ctrl-label" for="inp-cols">Bars per Row</label>
        <input class="ctrl-input" id="inp-cols" type="number" min="1" step="1" value="10" />
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label" for="inp-margin">Margin (mm)</label>
        <input class="ctrl-input" id="inp-margin" type="number" min="0" step="1" value="5" />
      </div>
      <button class="export-btn" id="btn-export">Export SVG</button>
      <div class="info-strip" id="info-strip">Load settings to see bar info</div>
    </div>

  </aside>

  <!-- ── Three.js viewport ───────────────────────────── -->
  <div class="viewport-wrap">
    <canvas id="three-canvas"></canvas>
    <div class="viewport-hint">Drag to orbit · Scroll to zoom · Right-drag to pan</div>
    <div class="viewport-stats" id="vp-stats"></div>
  </div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── State ────────────────────────────────────────────────────────────────────
const S = {
  mode:      'flat',   // flat | vault
  units:     'mm',     // mm | in
  width:     400,
  height:    400,
  gap:       50,
  barW:      15,
  endShape:  'square', // square | round | tab
  barCount:  1,        // 1 | 2
  holeDia:   6,
  arcHeight: 100,
  cols:      10,
  margin:    5,
};

// ─── Three.js setup ──────────────────────────────────────────────────────────
const canvas   = document.getElementById('three-canvas');
const wrap     = canvas.parentElement;
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x141810);
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(5, 8, 6);
scene.add(sun);

const fill = new THREE.DirectionalLight(0x8FAF6E, 0.35);
fill.position.set(-4, -3, -5);
scene.add(fill);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 5000);
camera.position.set(0, 0, 600);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;

// Lattice group
let latticeGroup = new THREE.Group();
scene.add(latticeGroup);

// ─── Resize ──────────────────────────────────────────────────────────────────
function onResize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(onResize).observe(wrap);
onResize();

// ─── Animate ─────────────────────────────────────────────────────────────────
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

// ─── Lattice computation ─────────────────────────────────────────────────────

// Convert gap to mm regardless of current unit
function toMM(v) { return S.units === 'in' ? v * 25.4 : v; }

function computeLattice() {
  const W       = toMM(S.width);
  const H       = toMM(S.height);
  const gap     = toMM(S.gap);
  const barW    = toMM(S.barW);
  const holeDia = toMM(S.holeDia);
  const arcH    = toMM(S.arcHeight);

  const nX = Math.max(1, Math.ceil(W / gap));
  const nY = Math.max(1, Math.ceil(H / gap));
  const barLen = gap * Math.SQRT2;
  const holeInset = barW / 2;     // distance from bar end to hole center

  // Arc radius (barrel vault)
  const R = S.mode === 'vault' ? (W * W) / (8 * arcH) + arcH / 2 : null;

  // Pivot point positions
  // Flat: (i * gap - W/2, j * gap - H/2, 0)  for i in [0..nX], j in [0..nY]
  // Vault: x → along arc on cylinder, y → straight, z → height on cylinder
  function pivotPos(i, j) {
    if (S.mode === 'vault' && R !== null) {
      const totalAngle = W / R;
      const angle = -totalAngle / 2 + (i / nX) * totalAngle;
      const x = R * Math.sin(angle);
      const z = R - R * Math.cos(angle); // rises from 0
      const y = j * gap - H / 2;
      return new THREE.Vector3(x, y, z);
    }
    return new THREE.Vector3(i * gap - W / 2, j * gap - H / 2, 0);
  }

  // Build bar list: each bar = { p0, p1, type }
  const bars = [];
  for (let j = 0; j < nY; j++) {
    for (let i = 0; i < nX; i++) {
      const p00 = pivotPos(i,   j);
      const p11 = pivotPos(i+1, j+1);
      const p10 = pivotPos(i+1, j);
      const p01 = pivotPos(i,   j+1);
      bars.push({ p0: p00, p1: p11, type: 'A' });
      bars.push({ p0: p10, p1: p01, type: 'B' });
    }
  }

  return { bars, barLen, barW, holeDia, holeInset, nX, nY, W, H, R, gap };
}

// ─── Build Three.js geometry ──────────────────────────────────────────────────
const MAT_A = new THREE.MeshPhongMaterial({ color: 0x8FAF6E, specular: 0x1a2010, shininess: 25, side: THREE.DoubleSide });
const MAT_B = new THREE.MeshPhongMaterial({ color: 0xA8C882, specular: 0x1a2010, shininess: 25, side: THREE.DoubleSide });
const MAT_HOLE = new THREE.MeshBasicMaterial({ color: 0x0d1008 });

let debounceTimer = null;

function scheduleRebuild() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(rebuildLattice, 220);
}

function rebuildLattice() {
  // Dispose previous meshes
  latticeGroup.traverse(obj => {
    if (obj.isMesh) {
      obj.geometry.dispose();
    }
  });
  latticeGroup.clear();

  const { bars, barLen, barW, holeDia, holeInset, nX, nY, W, H, R } = computeLattice();

  const BAR_THICK = 3; // visual 3mm thickness
  const barGeo = new THREE.BoxGeometry(barLen, barW, BAR_THICK);

  // Rounded end cap geometry (two half-cylinders at bar ends)
  let capGeoL = null, capGeoR = null;
  if (S.endShape === 'round') {
    capGeoL = new THREE.CylinderGeometry(barW / 2, barW / 2, BAR_THICK, 16);
    capGeoR = capGeoL.clone();
  }

  // Tab bumps
  let tabGeoL = null, tabGeoR = null;
  if (S.endShape === 'tab') {
    tabGeoL = new THREE.CylinderGeometry(barW * 0.32, barW * 0.32, BAR_THICK, 12);
    tabGeoR = tabGeoL.clone();
  }

  // Hole cylinder (visual overlay)
  const holeR = holeDia / 2;
  const holeGeo = new THREE.CylinderGeometry(holeR, holeR, BAR_THICK + 0.2, 16);

  // Offsets when barCount = 2: offset each pair perpendicularly
  const offsets = S.barCount === 2
    ? [-barW * 0.65, barW * 0.65]
    : [0];

  bars.forEach(({ p0, p1, type }) => {
    const mid   = new THREE.Vector3().addVectors(p0, p1).multiplyScalar(0.5);
    const dir   = new THREE.Vector3().subVectors(p1, p0).normalize();
    const perp  = new THREE.Vector3(-dir.y, dir.x, 0).normalize();

    // Up vector for the flat bar face
    const barUp = new THREE.Vector3(0, 0, 1);
    const quat  = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(1, 0, 0), dir);

    const mat = type === 'A' ? MAT_A : MAT_B;

    offsets.forEach(offset => {
      const centerPos = mid.clone().addScaledVector(perp, offset);

      // Main bar body
      const mesh = new THREE.Mesh(barGeo, mat);
      mesh.position.copy(centerPos);
      mesh.quaternion.copy(quat);
      latticeGroup.add(mesh);

      // Quaternion to make a Y-axis cylinder go through bar face (local Z axis)
      const faceQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(-Math.PI / 2, 0, 0));

      // End shape additions
      if (S.endShape !== 'square') {
        const geo = S.endShape === 'round' ? capGeoL : tabGeoL;
        if (geo) {
          [-1, 1].forEach(side => {
            const cap = new THREE.Mesh(geo, mat);
            // Orient cap: cylinder through bar face, then rotated with bar
            cap.quaternion.copy(quat).multiply(faceQuat);
            cap.position.copy(centerPos).addScaledVector(dir, side * barLen / 2);
            latticeGroup.add(cap);
          });
        }
      }

      // Holes: inset from each end + center
      const hPos = [
        -(barLen / 2 - holeInset),
        0,
         (barLen / 2 - holeInset),
      ];

      hPos.forEach(hp => {
        const hole = new THREE.Mesh(holeGeo, MAT_HOLE);
        hole.quaternion.copy(quat).multiply(faceQuat);
        hole.position.copy(centerPos).addScaledVector(dir, hp);
        latticeGroup.add(hole);
      });
    });
  });

  // Auto-fit camera on first load or big changes
  const diagonal = Math.sqrt(W * W + H * H);
  const dist = diagonal * 0.9 + 100;
  camera.position.set(0, 0, dist);
  controls.target.set(0, 0, 0);
  controls.update();

  // Update UI
  updateInfo(bars.length * offsets.length, bars[0] ? barLen : 0, nX, nY);
  updateVaultHint();
}

function updateInfo(totalBars, barLen, nX, nY) {
  const unitLabel = S.units;
  const factor = S.units === 'in' ? 1 / 25.4 : 1;
  const lenStr = (barLen * factor).toFixed(1);
  const wStr   = S.width;
  const hStr   = S.height;
  document.getElementById('cell-hint').textContent = `${nX} × ${nY} cells = ${nX * nY * 2} bars`;
  document.getElementById('info-strip').innerHTML =
    `${totalBars} bars total<br>` +
    `Bar length: ${lenStr} ${unitLabel}<br>` +
    `Bar width: ${S.barW} ${unitLabel}<br>` +
    `Coverage: ${wStr} × ${hStr} ${unitLabel}`;
  document.getElementById('vp-stats').textContent =
    `${nX}×${nY} cells · ${totalBars} bars · L=${lenStr}${unitLabel}`;
}

function updateVaultHint() {
  if (S.mode !== 'vault') return;
  const W = toMM(S.width);
  const arcH = toMM(S.arcHeight);
  if (arcH <= 0) return;
  const R = (W * W) / (8 * arcH) + arcH / 2;
  const factor = S.units === 'in' ? 1 / 25.4 : 1;
  document.getElementById('vault-hint').textContent =
    `R = ${(R * factor).toFixed(1)} ${S.units}`;
}

// ─── SVG Export ──────────────────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', exportSVG);

function exportSVG() {
  const { barLen, barW, holeDia, holeInset, nX, nY } = computeLattice();

  const barsPerRow = Math.max(1, parseInt(document.getElementById('inp-cols').value) || 10);
  const margin     = parseFloat(document.getElementById('inp-margin').value) || 5;
  const endShape   = S.endShape;
  const totalBars  = nX * nY * 2 * S.barCount;

  // All bars identical — just tile them
  const cellW = barLen + margin;
  const cellH = barW + margin;
  const cols  = Math.min(barsPerRow, totalBars);
  const rows  = Math.ceil(totalBars / cols);
  const pageW = cols * cellW + margin;
  const pageH = rows * cellH + margin;

  const lines = [
    `<?xml version="1.0" encoding="UTF-8"?>`,
    `<svg xmlns="http://www.w3.org/2000/svg"`,
    `     width="${pageW.toFixed(2)}mm" height="${pageH.toFixed(2)}mm"`,
    `     viewBox="0 0 ${pageW.toFixed(4)} ${pageH.toFixed(4)}">`,
    `  <!-- Scissor Lattice | ${totalBars} bars | ${barLen.toFixed(1)} x ${barW.toFixed(1)} mm each | ${nX}x${nY} cells -->`,
    `  <!-- Qty per piece: ${totalBars} | Hole dia: ${holeDia.toFixed(1)}mm -->`,
    `  <style>`,
    `    .cut  { fill: none; stroke: #000000; stroke-width: 0.1; }`,
    `    .hole { fill: none; stroke: #ff0000; stroke-width: 0.1; }`,
    `    .lbl  { font-family: monospace; font-size: 2px; fill: #555; }`,
    `  </style>`,
  ];

  // Hole positions along bar (from bar left edge x=0)
  const hX = [
    holeInset,
    barLen / 2,
    barLen - holeInset,
  ];
  const hY = barW / 2;
  const hR = holeDia / 2;

  function barPath(ox, oy) {
    const x = ox, y = oy;
    const r = barW / 2;
    let d;
    if (endShape === 'square') {
      d = `M${x.toFixed(4)},${y.toFixed(4)} h${barLen.toFixed(4)} v${barW.toFixed(4)} h${(-barLen).toFixed(4)} Z`;
    } else if (endShape === 'round') {
      // Rounded rect via arc
      const rx = r.toFixed(4);
      d = `M${(x + r).toFixed(4)},${y.toFixed(4)}` +
          ` h${(barLen - 2 * r).toFixed(4)}` +
          ` a${rx},${rx} 0 0 1 ${rx},${rx}` +
          ` v${(barW - 2 * r).toFixed(4)}` +
          ` a${rx},${rx} 0 0 1 ${(-r).toFixed(4)},${rx}` +
          ` h${(-(barLen - 2 * r)).toFixed(4)}` +
          ` a${rx},${rx} 0 0 1 ${(-r).toFixed(4)},${(-r).toFixed(4)}` +
          ` v${(-(barW - 2 * r)).toFixed(4)}` +
          ` a${rx},${rx} 0 0 1 ${rx},${(-r).toFixed(4)} Z`;
    } else {
      // Tab: rect body + small semicircle bump on each end tip
      const tabR = (barW * 0.32).toFixed(4);
      const rx   = r.toFixed(4);
      d = `M${x.toFixed(4)},${y.toFixed(4)} h${barLen.toFixed(4)} v${barW.toFixed(4)} h${(-barLen).toFixed(4)} Z`;
      // Tab bumps as separate circles (for laser cut holes or decorative)
      // emitted as separate <circle> elements below
    }
    return d;
  }

  for (let idx = 0; idx < totalBars; idx++) {
    const col = idx % cols;
    const row = Math.floor(idx / cols);
    const ox  = margin + col * cellW;
    const oy  = margin + row * cellH;

    lines.push(`  <g id="bar-${idx + 1}">`);
    lines.push(`    <path class="cut" d="${barPath(ox, oy)}"/>`);

    // Tab bumps (separate cutouts on each short end)
    if (endShape === 'tab') {
      const tabR = (barW * 0.32).toFixed(4);
      lines.push(`    <circle class="cut" cx="${(ox).toFixed(4)}" cy="${(oy + barW / 2).toFixed(4)}" r="${tabR}"/>`);
      lines.push(`    <circle class="cut" cx="${(ox + barLen).toFixed(4)}" cy="${(oy + barW / 2).toFixed(4)}" r="${tabR}"/>`);
    }

    // Pivot holes
    hX.forEach(hx => {
      lines.push(`    <circle class="hole" cx="${(ox + hx).toFixed(4)}" cy="${(oy + hY).toFixed(4)}" r="${hR.toFixed(4)}"/>`);
    });

    lines.push(`  </g>`);
  }

  // Cut list label
  const factor = S.units === 'in' ? 1 / 25.4 : 1;
  const lenDisp = (barLen * factor).toFixed(1);
  lines.push(`  <text class="lbl" x="${margin}" y="${(pageH - 1).toFixed(2)}">`);
  lines.push(`    Scissor Lattice — ${totalBars} bars — ${lenDisp}×${S.barW}${S.units} — hole ⌀${S.holeDia}${S.units} — ${nX}×${nY} cells`);
  lines.push(`  </text>`);
  lines.push(`</svg>`);

  const blob = new Blob([lines.join('\n')], { type: 'image/svg+xml' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `scissor-lattice-${totalBars}bars.svg`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ─── Settings wiring ─────────────────────────────────────────────────────────

function wireSegmented(id, key, onchange) {
  const el = document.getElementById(id);
  el.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      el.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const raw = btn.dataset.val;
      S[key] = key === 'barCount' ? parseInt(raw) : raw;
      if (onchange) onchange();
    });
  });
}

function wireInput(id, key, transform) {
  document.getElementById(id).addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    if (!isNaN(v) && v > 0) {
      S[key] = transform ? transform(v) : v;
      scheduleRebuild();
    }
  });
}

// Mode toggle also shows/hides vault panel
wireSegmented('seg-mode', 'mode', () => {
  const vaultPanel = document.getElementById('vault-panel');
  if (S.mode === 'vault') {
    vaultPanel.classList.add('visible');
  } else {
    vaultPanel.classList.remove('visible');
  }
  scheduleRebuild();
});

wireSegmented('seg-units', 'units', () => {
  // Convert stored mm values to new unit for display and state
  const toNew = S.units === 'in' ? (v) => +(v / 25.4).toFixed(4) : (v) => +(v * 25.4).toFixed(2);
  const fields = ['inp-width', 'inp-height', 'inp-gap', 'inp-barw', 'inp-hole', 'inp-arc'];
  const keys   = ['width', 'height', 'gap', 'barW', 'holeDia', 'arcHeight'];
  // Convert: previous values were stored in old unit; toMM gives mm; then convert to new unit
  const prevUnit = S.units === 'in' ? 'mm' : 'in';
  fields.forEach((fid, i) => {
    const oldVal = S[keys[i]];
    const asMM   = prevUnit === 'mm' ? oldVal : oldVal * 25.4;
    const newVal = S.units === 'in' ? +(asMM / 25.4).toFixed(3) : +asMM.toFixed(1);
    S[keys[i]] = newVal;
    document.getElementById(fid).value = newVal;
  });
  scheduleRebuild();
});

wireSegmented('seg-end',   'endShape',  scheduleRebuild);
wireSegmented('seg-count', 'barCount',  scheduleRebuild);

wireInput('inp-width',  'width');
wireInput('inp-height', 'height');
wireInput('inp-gap',    'gap');
wireInput('inp-barw',   'barW');
wireInput('inp-hole',   'holeDia');
wireInput('inp-arc',    'arcHeight');

// ─── Initial build ───────────────────────────────────────────────────────────
rebuildLattice();
</script>
