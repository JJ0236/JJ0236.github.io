<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/lazar/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAZAR - Laser Image Preparation Tool</title>
    <meta name="description" content="LAZAR - Professional laser engraving image preparation with advanced dithering algorithms" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/lazar/assets/index-Bb-o2VaA.js"></script>
    <link rel="stylesheet" crossorigin href="/lazar/assets/index-BnTGviK0.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap">
    <style>
      /* ── Earthy theme overrides ─────────────────────────── */
      :root {
        --bg-primary:   #1E2218;
        --bg-secondary: #191B14;
        --bg-tertiary:  #2A3220;
        --bg-dark:      #141610;
        --bg-card:      #1A1D14;
        --bg-input:     #252A1E;
        --text-primary:   #D4CDB8;
        --text-secondary: #9A9580;
        --text-muted:     #5A5A48;
        --accent:       #5C7A4E;
        --accent-hover: #8FAF6E;
        --accent-secondary: #8B6340;
        --border:       #2C3024;
        --border-light: #3A4030;
        --font-family:  'Space Grotesk', system-ui, sans-serif;
      }

      /* Hide mode toggle (Normal/Easy) before React paints — prevents flash */
      .mode-toggle { display: none !important; }
      /* Tool header bar */
      .tool-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 48px;
        background: #3A4A2C;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        z-index: 99999;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        font-family: system-ui, sans-serif;
      }
      .tool-header-back {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        color: #8A8070;
        font-size: 0.82rem;
        font-weight: 500;
        text-decoration: none;
        transition: color 0.2s;
      }
      .tool-header-back:hover { color: #D9D0C1; }
      .tool-header-back svg { width: 14px; height: 14px; flex-shrink: 0; }
      .tool-header-site {
        font-size: 0.68rem;
        color: #6B6055;
        letter-spacing: 0.06em;
      }
      /* Push React app below the header */
      #root { padding-top: 48px; }
    </style>
  </head>
  <body>
    <header class="tool-header">
      <a href="/projects/" class="tool-header-back">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9,1 4,7 9,13"/>
        </svg>
        Projects
      </a>
      <span class="tool-header-site">joshhicks.info</span>
    </header>
    <div id="root"></div>
    <script src="/lazar/assets/ditherfix.js?v=4" defer></script>
    <script src="/lazar/assets/dpifix.js?v=2" defer></script>
    <script src="/lazar/assets/zoompan.js?v=3" defer></script>
    <script src="/lazar/assets/puzzle.js?v=9" defer></script>
    <script src="/lazar/assets/bedazzle.js?v=1" defer></script>
    <script src="/lazar/assets/3dengrave.js?v=8" defer></script>
    <script src="/lazar/assets/upscale.js?v=1" defer></script>
    <script src="/lazar/assets/effects.js?v=1" defer></script>
    <script src="/lazar/assets/depthmap.js?v=9" defer></script>
    <script src="/lazar/assets/bugreport.js?v=2" defer></script>
  </body>
</html>
