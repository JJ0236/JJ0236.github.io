<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Josh Hicks</title>
  <link rel="stylesheet" href="/styles/main.css" />
  <style>
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--space-4);
      max-width: 680px;
    }
    .contact-card {
      background: var(--chalk);
      border: 1px solid var(--slate-subtle);
      border-radius: var(--radius);
      padding: var(--space-6);
      display: flex;
      align-items: flex-start;
      gap: var(--space-4);
      text-decoration: none;
      box-shadow: var(--shadow-xs);
      transition: box-shadow var(--transition), transform var(--transition), border-color var(--transition);
    }
    .contact-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
      border-color: var(--soil-mid);
    }
    .contact-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bark-light);
      border-radius: var(--radius-sm);
      color: var(--moss-dark);
      flex-shrink: 0;
    }
    .contact-icon svg {
      width: 20px;
      height: 20px;
    }
    .contact-info { flex: 1; }
    .contact-label {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--soil-dark);
      margin-bottom: var(--space-1);
    }
    .contact-value {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--slate-mid);
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="site-layout">
    <main class="site-content">
      <div class="page-header">
        <div class="page-title">Contact</div>
        <div class="page-subtitle">// get in touch</div>
      </div>

      <div class="contact-grid">

        <a href="mailto:findme@joshhicks.info" class="contact-card fade-up">
          <div class="contact-icon">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 4h14a1 1 0 011 1v9a1 1 0 01-1 1H3a1 1 0 01-1-1V5a1 1 0 011-1z"/>
              <polyline points="3,4 10,11 17,4"/>
            </svg>
          </div>
          <div class="contact-info">
            <div class="contact-label">Email</div>
            <div class="contact-value">findme@joshhicks.info</div>
          </div>
        </a>

        <a href="https://github.com/JJ0236" target="_blank" rel="noopener" class="contact-card fade-up">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24" fill="currentColor">

            </svg>
          </div>
          <div class="contact-info">
            <div class="contact-label">GitHub</div>
            <div class="contact-value">github.com/JJ0236</div>
          </div>
        </a>

        <a href="https://www.linkedin.com/in/joshua-hicks-01b57b246" target="_blank" rel="noopener" class="contact-card fade-up">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </div>
          <div class="contact-info">
            <div class="contact-label">LinkedIn</div>
            <div class="contact-value">linkedin.com/in/joshua-hicks</div>
          </div>
        </a>

      </div>
    </main>
  </div>
  <script src="/scripts/nav.js"></script>
</body>
</html>
