<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>void — Subdomain Radar</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/styles/main.css" />
  <style>
    html, body { margin:0; padding:0; min-height:100%; background:#0d110b; color:var(--sidebar-text); font-family:var(--font-body); }

    #void-bar {
      position:sticky; top:0; z-index:100; height:40px;
      background:var(--moss-dark); border-bottom:1px solid rgba(143,175,110,0.18);
      display:flex; align-items:center; padding:0 1.25rem; gap:1.5rem;
    }
    #void-bar a { font-family:var(--font-mono); font-size:0.72rem; color:var(--moss-light); text-decoration:none; letter-spacing:0.06em; transition:color 0.15s; }
    #void-bar a:hover { color:var(--sidebar-text); }
    #void-label { font-family:var(--font-mono); font-size:0.72rem; color:var(--sidebar-muted); letter-spacing:0.14em; text-transform:uppercase; margin-left:auto; }

    #page { max-width:860px; margin:0 auto; padding:2.5rem 1.5rem 4rem; }

    .page-title { font-family:var(--font-mono); font-size:0.7rem; color:var(--sidebar-muted); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:1.5rem; }

    .search-row { display:flex; gap:0.5rem; margin-bottom:0.75rem; flex-wrap:wrap; }
    #domain-input {
      flex:1; min-width:200px;
      background:rgba(0,0,0,0.3); border:1px solid rgba(143,175,110,0.2); border-radius:6px;
      padding:0.55rem 0.85rem; font-family:var(--font-mono); font-size:0.88rem;
      color:var(--sidebar-text); outline:none; transition:border-color 0.2s;
    }
    #domain-input:focus { border-color:rgba(143,175,110,0.5); }
    #domain-input::placeholder { color:var(--sidebar-muted); }
    .btn {
      background:rgba(143,175,110,0.12); border:1px solid rgba(143,175,110,0.2); border-radius:6px;
      padding:0.55rem 1.1rem; font-family:var(--font-mono); font-size:0.82rem;
      color:var(--moss-light); cursor:pointer; transition:background 0.15s, border-color 0.15s; white-space:nowrap;
    }
    .btn:hover { background:rgba(143,175,110,0.2); border-color:rgba(143,175,110,0.4); }
    .btn:disabled { opacity:0.45; cursor:not-allowed; }

    .hint { font-family:var(--font-mono); font-size:0.7rem; color:var(--sidebar-muted); margin-bottom:1.5rem; }

    /* Stats bar */
    #stats-bar {
      display:none; margin-bottom:1rem;
      background:#141a10; border:1px solid rgba(143,175,110,0.14); border-radius:8px;
      padding:0.85rem 1.1rem; display:none;
      flex-wrap:wrap; gap:1.5rem;
    }
    .stat { display:flex; flex-direction:column; gap:0.15rem; }
    .stat-val { font-family:var(--font-mono); font-size:1.15rem; color:var(--moss-light); font-weight:500; }
    .stat-lbl { font-family:var(--font-mono); font-size:0.65rem; color:var(--sidebar-muted); letter-spacing:0.1em; text-transform:uppercase; }

    /* Filter */
    #filter-row { display:none; margin-bottom:0.9rem; }
    #filter-input {
      background:rgba(0,0,0,0.3); border:1px solid rgba(143,175,110,0.15); border-radius:6px;
      padding:0.4rem 0.75rem; font-family:var(--font-mono); font-size:0.8rem;
      color:var(--sidebar-text); outline:none; width:100%; max-width:320px;
    }
    #filter-input:focus { border-color:rgba(143,175,110,0.4); }
    #filter-input::placeholder { color:var(--sidebar-muted); }

    /* Results list */
    #results-list { list-style:none; margin:0; padding:0; }
    #results-list li {
      font-family:var(--font-mono); font-size:0.82rem; padding:0.38rem 0.5rem;
      border-bottom:1px solid rgba(143,175,110,0.05); display:flex; align-items:center; gap:0.6rem;
    }
    #results-list li:hover { background:rgba(143,175,110,0.04); }
    .sub-name { color:var(--sidebar-text); flex:1; word-break:break-all; }
    .sub-link { color:var(--sidebar-muted); text-decoration:none; font-size:0.68rem; flex-shrink:0; }
    .sub-link:hover { color:var(--moss-light); }
    .sub-wildcard { color:var(--sidebar-muted); font-style:italic; }

    .msg { font-family:var(--font-mono); font-size:0.8rem; color:var(--sidebar-muted); padding:1rem 0; }

    #auth-gate { position:fixed; inset:0; z-index:9999; background:#0a0e08; }
    #auth-gate.hidden { display:none; }
  </style>
</head>
<body>

<div id="auth-gate"></div>

<div id="void-bar">
  <a href="/void/">← void</a>
  <span id="void-label">subdomain radar</span>
</div>

<div id="page">
  <div class="page-title">// certificate transparency subdomain enumeration</div>

  <div class="search-row">
    <input type="text" id="domain-input" placeholder="example.com" autocomplete="off" spellcheck="false" />
    <button class="btn" id="scan-btn">Scan</button>
  </div>
  <div class="hint">Queries crt.sh certificate transparency logs — finds every subdomain ever issued a TLS cert. No active scanning.</div>

  <div id="stats-bar">
    <div class="stat"><span class="stat-val" id="s-total">0</span><span class="stat-lbl">Subdomains</span></div>
    <div class="stat"><span class="stat-val" id="s-unique">0</span><span class="stat-lbl">Unique</span></div>
    <div class="stat"><span class="stat-val" id="s-wildcards">0</span><span class="stat-lbl">Wildcards</span></div>
    <div class="stat"><span class="stat-val" id="s-certs">0</span><span class="stat-lbl">Cert Records</span></div>
  </div>

  <div id="filter-row">
    <input type="text" id="filter-input" placeholder="Filter subdomains…" />
  </div>

  <div id="results-msg"></div>
  <ul id="results-list"></ul>
</div>

<script>
const WORKER = 'https://sherlock.joshua02050236.workers.dev';

(function () {
  if (sessionStorage.getItem('void_auth') !== '1') {
    window.location.replace('/projects/');
    return;
  }
  document.getElementById('auth-gate').classList.add('hidden');

  const domainInput = document.getElementById('domain-input');
  const scanBtn     = document.getElementById('scan-btn');
  const statsBar    = document.getElementById('stats-bar');
  const filterRow   = document.getElementById('filter-row');
  const filterInput = document.getElementById('filter-input');
  const resultsMsg  = document.getElementById('results-msg');
  const resultsList = document.getElementById('results-list');

  let allSubs = [];

  domainInput.addEventListener('keydown', e => { if (e.key === 'Enter') scan(); });
  scanBtn.addEventListener('click', scan);
  filterInput.addEventListener('input', renderFiltered);

  async function scan() {
    const raw = domainInput.value.trim().toLowerCase().replace(/^(https?:\/\/)?(www\.)?/, '').replace(/\/.*$/, '');
    if (!raw || !/^[a-z0-9][a-z0-9.-]+\.[a-z]{2,}$/.test(raw)) {
      setMsg('Enter a valid domain like <code>example.com</code>');
      return;
    }

    scanBtn.disabled = true;
    statsBar.style.display = 'none';
    filterRow.style.display = 'none';
    resultsList.innerHTML = '';
    setMsg('Querying certificate transparency logs…');

    try {
      const res = await fetch(`${WORKER}/crt?domain=${encodeURIComponent(raw)}`);
      if (!res.ok) throw new Error(`Worker returned ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      if (!Array.isArray(data) || data.length === 0) {
        setMsg('No certificate records found for this domain.');
        return;
      }

      // Extract and deduplicate subdomains
      const seen = new Set();
      const subs = [];
      let wildcards = 0;
      for (const cert of data) {
        const names = (cert.name_value || '').split('\n');
        for (const name of names) {
          const n = name.trim().toLowerCase();
          if (!n || seen.has(n)) continue;
          seen.add(n);
          subs.push(n);
          if (n.startsWith('*.')) wildcards++;
        }
      }
      subs.sort();
      allSubs = subs;

      document.getElementById('s-total').textContent   = subs.length;
      document.getElementById('s-unique').textContent  = subs.length;
      document.getElementById('s-wildcards').textContent = wildcards;
      document.getElementById('s-certs').textContent   = data.length;
      statsBar.style.display = 'flex';
      filterRow.style.display = 'block';
      setMsg('');
      renderFiltered();
    } catch (e) {
      setMsg(`Error: ${e.message}`);
    } finally {
      scanBtn.disabled = false;
    }
  }

  function renderFiltered() {
    const q = filterInput.value.toLowerCase().trim();
    const filtered = q ? allSubs.filter(s => s.includes(q)) : allSubs;
    if (filtered.length === 0) {
      resultsList.innerHTML = '';
      setMsg('No matches.');
      return;
    }
    setMsg('');
    resultsList.innerHTML = filtered.map(s => {
      const isWild = s.startsWith('*.');
      const href = isWild ? null : `https://${s}`;
      return `<li>
        <span class="sub-name ${isWild ? 'sub-wildcard' : ''}">${s}</span>
        ${href ? `<a class="sub-link" href="${href}" target="_blank" rel="noopener">↗ open</a>` : ''}
      </li>`;
    }).join('');
  }

  function setMsg(html) {
    resultsMsg.innerHTML = html ? `<div class="msg">${html}</div>` : '';
  }
})();
</script>
</body>
</html>
