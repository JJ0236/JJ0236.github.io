<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>void — Paint</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/styles/main.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
    }

    #void-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 40px;
      background: var(--moss-dark);
      border-bottom: 1px solid rgba(143,175,110,0.18);
      display: flex;
      align-items: center;
      padding: 0 1.25rem;
      gap: 1.5rem;
    }

    #void-bar a {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--moss-light);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.15s;
    }

    #void-bar a:hover { color: var(--sidebar-text); }

    #void-label {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--sidebar-muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-left: auto;
    }

    #paint-frame {
      position: fixed;
      top: 40px;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: calc(100% - 40px);
      border: none;
    }

    #auth-gate {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0a0e08;
    }

    #auth-gate.hidden { display: none; }
  </style>
</head>
<body>

  <div id="auth-gate"></div>

  <div id="void-bar">
    <a href="/void/">← void</a>
    <span id="void-label">paint</span>
  </div>

  <iframe
    id="paint-frame"
    src="https://jspaint.app/"
    title="MS Paint"
    allow="fullscreen; clipboard-read; clipboard-write"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads"
  ></iframe>

  <script>
  (function () {
    if (sessionStorage.getItem('void_auth') !== '1') {
      window.location.replace('/projects/');
      return;
    }
    document.getElementById('auth-gate').classList.add('hidden');
  })();
  </script>

</body>
</html>
