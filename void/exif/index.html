<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>void — EXIF Hunter</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/styles/main.css" />
  <style>
    html, body { margin:0; padding:0; min-height:100%; background:#0d110b; color:var(--sidebar-text); font-family:var(--font-body); }

    #void-bar {
      position:sticky; top:0; z-index:100; height:40px;
      background:var(--moss-dark); border-bottom:1px solid rgba(143,175,110,0.18);
      display:flex; align-items:center; padding:0 1.25rem; gap:1.5rem;
    }
    #void-bar a { font-family:var(--font-mono); font-size:0.72rem; color:var(--moss-light); text-decoration:none; letter-spacing:0.06em; transition:color 0.15s; }
    #void-bar a:hover { color:var(--sidebar-text); }
    #void-label { font-family:var(--font-mono); font-size:0.72rem; color:var(--sidebar-muted); letter-spacing:0.14em; text-transform:uppercase; margin-left:auto; }

    #page { max-width:860px; margin:0 auto; padding:2.5rem 1.5rem 4rem; }

    .page-title { font-family:var(--font-mono); font-size:0.7rem; color:var(--sidebar-muted); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:1.5rem; }

    #drop-zone {
      border:2px dashed rgba(143,175,110,0.25); border-radius:12px;
      padding:2.5rem 2rem; text-align:center; cursor:pointer;
      transition:border-color 0.2s, background 0.2s; position:relative;
    }
    #drop-zone:hover, #drop-zone.drag-over { border-color:rgba(143,175,110,0.55); background:rgba(143,175,110,0.04); }
    .drop-icon { font-size:2rem; margin-bottom:0.6rem; }
    .drop-main { font-family:var(--font-mono); font-size:0.83rem; color:var(--sidebar-text); margin-bottom:0.35rem; }
    .drop-sub  { font-family:var(--font-mono); font-size:0.72rem; color:var(--sidebar-muted); }

    #results { margin-top:2rem; display:none; }

    #preview-wrap { margin-bottom:1.5rem; }
    #preview-img  { max-width:280px; max-height:180px; border-radius:8px; border:1px solid rgba(143,175,110,0.15); display:block; }

    .r-section { margin-bottom:1.75rem; }
    .r-title {
      font-family:var(--font-mono); font-size:0.67rem; color:var(--sidebar-muted);
      letter-spacing:0.13em; text-transform:uppercase; margin-bottom:0.7rem;
      padding-bottom:0.35rem; border-bottom:1px solid rgba(143,175,110,0.1);
    }
    .r-row {
      display:flex; gap:0.75rem; padding:0.4rem 0;
      border-bottom:1px solid rgba(143,175,110,0.05); align-items:baseline; flex-wrap:wrap;
    }
    .r-key { font-family:var(--font-mono); font-size:0.74rem; color:var(--sidebar-muted); min-width:170px; flex-shrink:0; }
    .r-val { font-family:var(--font-mono); font-size:0.8rem; color:var(--sidebar-text); word-break:break-all; }
    .r-val a { color:var(--moss-light); text-decoration:none; }
    .r-val a:hover { text-decoration:underline; }

    .badge-gps  { display:inline-block; background:rgba(255,80,80,0.15); color:#ff8888; border:1px solid rgba(255,80,80,0.25); border-radius:4px; padding:0.12rem 0.45rem; font-family:var(--font-mono); font-size:0.62rem; letter-spacing:0.07em; text-transform:uppercase; margin-left:0.5rem; }
    .badge-none { display:inline-block; background:rgba(143,175,110,0.08); color:var(--sidebar-muted); border-radius:4px; padding:0.12rem 0.45rem; font-family:var(--font-mono); font-size:0.62rem; letter-spacing:0.07em; text-transform:uppercase; margin-left:0.5rem; }

    .msg { font-family:var(--font-mono); font-size:0.8rem; color:var(--sidebar-muted); padding:0.75rem 0; }

    #auth-gate { position:fixed; inset:0; z-index:9999; background:#0a0e08; }
    #auth-gate.hidden { display:none; }
  </style>
</head>
<body>

<div id="auth-gate"></div>

<div id="void-bar">
  <a href="/void/">← void</a>
  <span id="void-label">exif hunter</span>
</div>

<div id="page">
  <div class="page-title">// exif metadata extractor</div>

  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="drop-icon">📷</div>
    <div class="drop-main">Drop an image here, or click to upload</div>
    <div class="drop-sub">JPEG · TIFF · HEIC · PNG — extracts GPS, camera, timestamps &amp; more</div>
  </div>
  <input type="file" id="file-input" accept="image/*" style="display:none" />

  <div id="results">
    <div id="preview-wrap"></div>
    <div id="results-inner"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
<script>
(function () {
  if (sessionStorage.getItem('void_auth') !== '1') {
    window.location.replace('/projects/');
    return;
  }
  document.getElementById('auth-gate').classList.add('hidden');

  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const results   = document.getElementById('results');
  const previewWrap = document.getElementById('preview-wrap');
  const resultsInner = document.getElementById('results-inner');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) processFile(f);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) processFile(fileInput.files[0]); });

  async function processFile(file) {
    results.style.display = 'block';
    previewWrap.innerHTML = '';
    resultsInner.innerHTML = '<div class="msg">Parsing EXIF data…</div>';

    // Preview
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement('img');
      img.id = 'preview-img'; img.src = e.target.result; img.alt = 'preview';
      previewWrap.appendChild(img);
    };
    reader.readAsDataURL(file);

    try {
      const exif = await exifr.parse(file, {
        tiff:true, xmp:true, iptc:true, jfif:true, gps:true, icc:false, reviveValues:true, sanitize:true
      });

      if (!exif || Object.keys(exif).length === 0) {
        resultsInner.innerHTML = '<div class="msg">No EXIF metadata found — this image has likely been stripped. Try a camera photo directly from a device.</div>';
        return;
      }
      render(exif, file);
    } catch(e) {
      resultsInner.innerHTML = `<div class="msg">Parse error: ${e.message}</div>`;
    }
  }

  function row(k, v) {
    return `<div class="r-row"><span class="r-key">${k}</span><span class="r-val">${v}</span></div>`;
  }

  function render(exif, file) {
    const sections = [];

    // ── GPS ──────────────────────────────────────────────────
    const lat = exif.latitude  ?? exif.GPSLatitude;
    const lon = exif.longitude ?? exif.GPSLongitude;
    const alt = exif.GPSAltitude;
    const ref = exif.GPSImgDirectionRef || '';

    if (lat != null && lon != null) {
      const la = typeof lat === 'number' ? lat.toFixed(6) : String(lat);
      const lo = typeof lon === 'number' ? lon.toFixed(6) : String(lon);
      const gmaps  = `https://www.google.com/maps?q=${la},${lo}`;
      const osmaps = `https://www.openstreetmap.org/?mlat=${la}&mlon=${lo}&zoom=16`;
      sections.push(`
        <div class="r-section">
          <div class="r-title">📍 GPS Location <span class="badge-gps">⚠ COORDINATES FOUND</span></div>
          ${row('Latitude', la)}
          ${row('Longitude', lo)}
          ${alt != null ? row('Altitude', `${typeof alt === 'number' ? alt.toFixed(1) : alt} m`) : ''}
          ${exif.GPSImgDirection != null ? row('Compass Direction', `${exif.GPSImgDirection}° ${ref}`) : ''}
          ${row('Google Maps', `<a href="${gmaps}" target="_blank" rel="noopener">${gmaps}</a>`)}
          ${row('OpenStreetMap', `<a href="${osmaps}" target="_blank" rel="noopener">${osmaps}</a>`)}
        </div>`);
    } else {
      sections.push(`<div class="r-section"><div class="r-title">📍 GPS Location <span class="badge-none">not found</span></div><div class="msg" style="padding:0.3rem 0 0.8rem">No GPS coordinates embedded in this image.</div></div>`);
    }

    // ── Camera ────────────────────────────────────────────────
    const camFields = { Make:exif.Make, Model:exif.Model, LensMake:exif.LensMake, LensModel:exif.LensModel, Software:exif.Software, HostComputer:exif.HostComputer };
    const camRows = Object.entries(camFields).filter(([,v]) => v != null && String(v).trim()).map(([k,v]) => row(k, esc(String(v)))).join('');
    if (camRows) sections.push(`<div class="r-section"><div class="r-title">📷 Camera & Software</div>${camRows}</div>`);

    // ── Timestamps ────────────────────────────────────────────
    const tFields = { 'Date/Time Original':exif.DateTimeOriginal, 'Date/Time Digitized':exif.DateTimeDigitized, 'Modify Date':exif.ModifyDate, 'Create Date':exif.CreateDate };
    const tRows = Object.entries(tFields).filter(([,v]) => v != null).map(([k,v]) => row(k, v instanceof Date ? v.toLocaleString() : esc(String(v)))).join('');
    if (tRows) sections.push(`<div class="r-section"><div class="r-title">🕐 Timestamps</div>${tRows}</div>`);

    // ── Image Settings ────────────────────────────────────────
    const imgFields = {
      'Image Width':  exif.ImageWidth  ?? exif.ExifImageWidth,
      'Image Height': exif.ImageHeight ?? exif.ExifImageHeight,
      'Orientation':  exif.Orientation,
      'Color Space':  exif.ColorSpace,
      'Exposure Time':exif.ExposureTime != null ? (exif.ExposureTime < 1 ? `1/${Math.round(1/exif.ExposureTime)}s` : `${exif.ExposureTime}s`) : null,
      'F-Number':     exif.FNumber != null ? `f/${exif.FNumber}` : null,
      'ISO':          exif.ISO,
      'Focal Length': exif.FocalLength != null ? `${exif.FocalLength}mm` : null,
      'Flash':        exif.Flash,
      'Metering Mode':exif.MeteringMode,
      'White Balance':exif.WhiteBalance,
    };
    const imgRows = Object.entries(imgFields).filter(([,v]) => v != null).map(([k,v]) => row(k, esc(String(v)))).join('');
    if (imgRows) sections.push(`<div class="r-section"><div class="r-title">🖼 Image Settings</div>${imgRows}</div>`);

    // ── Author / Meta ─────────────────────────────────────────
    const metaFields = { Artist:exif.Artist, Copyright:exif.Copyright, ImageDescription:exif.ImageDescription, UserComment:exif.UserComment };
    const metaRows = Object.entries(metaFields).filter(([,v]) => v != null && String(v).trim()).map(([k,v]) => row(k, esc(String(v)))).join('');
    if (metaRows) sections.push(`<div class="r-section"><div class="r-title">✍️ Author & Description</div>${metaRows}</div>`);

    // ── File info ─────────────────────────────────────────────
    sections.push(`<div class="r-section"><div class="r-title">📄 File</div>
      ${row('Filename', esc(file.name))}
      ${row('File Size', (file.size / 1024).toFixed(1) + ' KB')}
      ${row('MIME Type', file.type || 'unknown')}
    </div>`);

    resultsInner.innerHTML = sections.join('');
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
})();
</script>
</body>
</html>
