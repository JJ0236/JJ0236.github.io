<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>void — IP Intel</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/styles/main.css" />
  <style>
    html, body { margin:0; padding:0; min-height:100%; background:#0d110b; color:var(--sidebar-text); font-family:var(--font-body); }

    #void-bar {
      position:sticky; top:0; z-index:100; height:40px;
      background:var(--moss-dark); border-bottom:1px solid rgba(143,175,110,0.18);
      display:flex; align-items:center; padding:0 1.25rem; gap:1.5rem;
    }
    #void-bar a { font-family:var(--font-mono); font-size:0.72rem; color:var(--moss-light); text-decoration:none; letter-spacing:0.06em; transition:color 0.15s; }
    #void-bar a:hover { color:var(--sidebar-text); }
    #void-label { font-family:var(--font-mono); font-size:0.72rem; color:var(--sidebar-muted); letter-spacing:0.14em; text-transform:uppercase; margin-left:auto; }

    #page { max-width:800px; margin:0 auto; padding:2.5rem 1.5rem 4rem; }

    .page-title { font-family:var(--font-mono); font-size:0.7rem; color:var(--sidebar-muted); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:1.5rem; }

    .search-row { display:flex; gap:0.5rem; margin-bottom:0.5rem; flex-wrap:wrap; }
    #ip-input {
      flex:1; min-width:200px;
      background:rgba(0,0,0,0.3); border:1px solid rgba(143,175,110,0.2); border-radius:6px;
      padding:0.55rem 0.85rem; font-family:var(--font-mono); font-size:0.88rem;
      color:var(--sidebar-text); outline:none; transition:border-color 0.2s;
    }
    #ip-input:focus { border-color:rgba(143,175,110,0.5); }
    #ip-input::placeholder { color:var(--sidebar-muted); }
    .btn {
      background:rgba(143,175,110,0.12); border:1px solid rgba(143,175,110,0.2); border-radius:6px;
      padding:0.55rem 1.1rem; font-family:var(--font-mono); font-size:0.82rem;
      color:var(--moss-light); cursor:pointer; transition:background 0.15s, border-color 0.15s; white-space:nowrap;
    }
    .btn:hover  { background:rgba(143,175,110,0.2); border-color:rgba(143,175,110,0.4); }
    .btn:disabled { opacity:0.45; cursor:not-allowed; }
    .btn-ghost {
      background:transparent; border:1px solid rgba(143,175,110,0.15); border-radius:6px;
      padding:0.55rem 1rem; font-family:var(--font-mono); font-size:0.78rem;
      color:var(--sidebar-muted); cursor:pointer; transition:color 0.15s, border-color 0.15s; white-space:nowrap;
    }
    .btn-ghost:hover { color:var(--moss-light); border-color:rgba(143,175,110,0.35); }

    .hint { font-family:var(--font-mono); font-size:0.7rem; color:var(--sidebar-muted); margin-bottom:1.75rem; }

    /* Big IP display */
    #ip-hero { display:none; margin-bottom:2rem; }
    .ip-addr { font-family:var(--font-mono); font-size:2rem; color:var(--moss-light); font-weight:500; letter-spacing:0.04em; }
    .ip-flag { font-size:1.5rem; margin-left:0.5rem; }
    .ip-sub  { font-family:var(--font-mono); font-size:0.8rem; color:var(--sidebar-muted); margin-top:0.3rem; }

    /* Flags */
    .flag-row { display:flex; gap:0.6rem; flex-wrap:wrap; margin-top:0.5rem; }
    .flag {
      display:inline-block; font-family:var(--font-mono); font-size:0.68rem; letter-spacing:0.07em; text-transform:uppercase;
      padding:0.18rem 0.55rem; border-radius:4px;
    }
    .flag-red    { background:rgba(255,80,80,0.15);  color:#ff8888; border:1px solid rgba(255,80,80,0.25); }
    .flag-amber  { background:rgba(255,180,50,0.15); color:#ffcc66; border:1px solid rgba(255,180,50,0.25); }
    .flag-green  { background:rgba(143,175,110,0.12); color:var(--moss-light); border:1px solid rgba(143,175,110,0.2); }
    .flag-grey   { background:rgba(143,175,110,0.06); color:var(--sidebar-muted); border:1px solid rgba(143,175,110,0.1); }

    /* Detail grid */
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; }
    @media(max-width:560px) { .detail-grid { grid-template-columns:1fr; } }

    .detail-card {
      background:#141a10; border:1px solid rgba(143,175,110,0.12); border-radius:8px;
      padding:1rem 1.1rem;
    }
    .detail-card-title { font-family:var(--font-mono); font-size:0.65rem; color:var(--sidebar-muted); letter-spacing:0.12em; text-transform:uppercase; margin-bottom:0.75rem; }
    .d-row { display:flex; gap:0.5rem; padding:0.3rem 0; border-bottom:1px solid rgba(143,175,110,0.05); flex-wrap:wrap; }
    .d-row:last-child { border-bottom:none; }
    .d-key { font-family:var(--font-mono); font-size:0.72rem; color:var(--sidebar-muted); min-width:110px; flex-shrink:0; }
    .d-val { font-family:var(--font-mono); font-size:0.78rem; color:var(--sidebar-text); word-break:break-all; }
    .d-val a { color:var(--moss-light); text-decoration:none; }
    .d-val a:hover { text-decoration:underline; }

    .msg { font-family:var(--font-mono); font-size:0.8rem; color:var(--sidebar-muted); padding:1rem 0; }

    #results { display:none; }

    #auth-gate { position:fixed; inset:0; z-index:9999; background:#0a0e08; }
    #auth-gate.hidden { display:none; }
  </style>
</head>
<body>

<div id="auth-gate"></div>

<div id="void-bar">
  <a href="/void/">← void</a>
  <span id="void-label">ip intel</span>
</div>

<div id="page">
  <div class="page-title">// ip address intelligence</div>

  <div class="search-row">
    <input type="text" id="ip-input" placeholder="8.8.8.8 or 2001:db8::1 (leave blank for your IP)" autocomplete="off" spellcheck="false" />
    <button class="btn" id="lookup-btn">Lookup</button>
    <button class="btn-ghost" id="myip-btn">My IP</button>
  </div>
  <div class="hint">Resolves geolocation, ISP, ASN, and risk flags (VPN / proxy / Tor / hosting) for any IPv4 or IPv6 address.</div>

  <div id="msg-box"></div>

  <div id="results">
    <div id="ip-hero">
      <div><span class="ip-addr" id="r-ip"></span><span class="ip-flag" id="r-flag"></span></div>
      <div class="ip-sub" id="r-loc"></div>
      <div class="flag-row" id="r-flags"></div>
    </div>

    <div class="detail-grid" id="detail-grid"></div>
  </div>
</div>

<script>
const WORKER = 'https://sherlock.joshua02050236.workers.dev';

(function () {
  if (sessionStorage.getItem('void_auth') !== '1') {
    window.location.replace('/projects/');
    return;
  }
  document.getElementById('auth-gate').classList.add('hidden');

  const ipInput   = document.getElementById('ip-input');
  const lookupBtn = document.getElementById('lookup-btn');
  const myipBtn   = document.getElementById('myip-btn');
  const msgBox    = document.getElementById('msg-box');
  const results   = document.getElementById('results');

  ipInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLookup(); });
  lookupBtn.addEventListener('click', doLookup);
  myipBtn.addEventListener('click', () => { ipInput.value = ''; doLookup(); });

  async function doLookup() {
    const ip = ipInput.value.trim();
    lookupBtn.disabled = true;
    results.style.display = 'none';
    setMsg('Looking up…');

    try {
      const qs = ip ? `?ip=${encodeURIComponent(ip)}` : '';
      const res = await fetch(`${WORKER}/ipintel${qs}`);
      if (!res.ok) throw new Error(`Worker returned ${res.status}`);
      const d = await res.json();
      if (d.error) throw new Error(d.error);
      if (d.status !== 'success') throw new Error(d.message || 'Lookup failed');
      setMsg('');
      render(d);
    } catch (e) {
      setMsg(`Error: ${e.message}`);
    } finally {
      lookupBtn.disabled = false;
    }
  }

  function render(d) {
    results.style.display = 'block';

    // Hero
    const hero = document.getElementById('ip-hero');
    hero.style.display = 'block';
    document.getElementById('r-ip').textContent = d.query || '—';
    document.getElementById('r-flag').textContent = d.countryCode ? flag(d.countryCode) : '';
    document.getElementById('r-loc').textContent = [d.city, d.regionName, d.country].filter(Boolean).join(', ');

    // Risk flags
    const flagsEl = document.getElementById('r-flags');
    const fParts = [];
    if (d.proxy)   fParts.push(`<span class="flag flag-red">⚠ Proxy / VPN</span>`);
    if (d.hosting) fParts.push(`<span class="flag flag-amber">⚡ Hosting / Datacenter</span>`);
    if (d.mobile)  fParts.push(`<span class="flag flag-green">📱 Mobile Network</span>`);
    if (!d.proxy && !d.hosting && !d.mobile) fParts.push(`<span class="flag flag-grey">Residential</span>`);
    flagsEl.innerHTML = fParts.join('');

    // Detail cards
    const grid = document.getElementById('detail-grid');
    grid.innerHTML = `
      <div class="detail-card">
        <div class="detail-card-title">🌍 Location</div>
        ${drow('IP', d.query)}
        ${drow('Country', `${flag(d.countryCode)} ${d.country} (${d.countryCode})`)}
        ${drow('Region', d.regionName)}
        ${drow('City', d.city)}
        ${drow('Timezone', d.timezone)}
        ${d.lat != null ? drow('Coordinates', `<a href="https://www.google.com/maps?q=${d.lat},${d.lon}" target="_blank" rel="noopener">${d.lat.toFixed(4)}, ${d.lon.toFixed(4)}</a>`) : ''}
      </div>
      <div class="detail-card">
        <div class="detail-card-title">🏢 Network</div>
        ${drow('ISP', d.isp)}
        ${drow('Organization', d.org)}
        ${drow('ASN', d.as)}
        ${drow('Proxy / VPN', d.proxy ? '⚠ Yes' : 'No')}
        ${drow('Hosting / DC', d.hosting ? '⚡ Yes' : 'No')}
        ${drow('Mobile', d.mobile ? '📱 Yes' : 'No')}
      </div>`;
  }

  function drow(k, v) {
    if (!v && v !== false && v !== 0) return '';
    return `<div class="d-row"><span class="d-key">${k}</span><span class="d-val">${v}</span></div>`;
  }

  // Country code → flag emoji
  function flag(cc) {
    if (!cc || cc.length !== 2) return '';
    const a = cc.toUpperCase().charCodeAt(0) - 65 + 0x1F1E6;
    const b = cc.toUpperCase().charCodeAt(1) - 65 + 0x1F1E6;
    return String.fromCodePoint(a, b);
  }

  function setMsg(html) {
    msgBox.innerHTML = html ? `<div class="msg">${html}</div>` : '';
  }
})();
</script>
</body>
</html>
