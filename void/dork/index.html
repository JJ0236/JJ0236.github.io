<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>void — Dork Builder</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/styles/main.css" />
  <style>
    html, body { margin:0; padding:0; min-height:100%; background:#0d110b; color:var(--sidebar-text); font-family:var(--font-body); }

    #void-bar {
      position:sticky; top:0; z-index:100; height:40px;
      background:var(--moss-dark); border-bottom:1px solid rgba(143,175,110,0.18);
      display:flex; align-items:center; padding:0 1.25rem; gap:1.5rem;
    }
    #void-bar a { font-family:var(--font-mono); font-size:0.72rem; color:var(--moss-light); text-decoration:none; letter-spacing:0.06em; transition:color 0.15s; }
    #void-bar a:hover { color:var(--sidebar-text); }
    #void-label { font-family:var(--font-mono); font-size:0.72rem; color:var(--sidebar-muted); letter-spacing:0.14em; text-transform:uppercase; margin-left:auto; }

    #page { max-width:860px; margin:0 auto; padding:2.5rem 1.5rem 4rem; }
    .page-title { font-family:var(--font-mono); font-size:0.7rem; color:var(--sidebar-muted); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:1.5rem; }

    /* Input area */
    #query-area {
      background:rgba(0,0,0,0.35); border:1px solid rgba(143,175,110,0.22); border-radius:8px;
      padding:0.9rem 1rem; font-family:var(--font-mono); font-size:0.9rem;
      color:var(--sidebar-text); outline:none; width:100%; box-sizing:border-box;
      resize:none; min-height:80px; transition:border-color 0.2s; line-height:1.5;
    }
    #query-area:focus { border-color:rgba(143,175,110,0.5); }
    #query-area::placeholder { color:var(--sidebar-muted); }

    .action-row { display:flex; gap:0.5rem; margin-top:0.6rem; flex-wrap:wrap; align-items:center; }
    .btn {
      background:rgba(143,175,110,0.12); border:1px solid rgba(143,175,110,0.2); border-radius:6px;
      padding:0.5rem 1.1rem; font-family:var(--font-mono); font-size:0.82rem;
      color:var(--moss-light); cursor:pointer; transition:background 0.15s, border-color 0.15s; white-space:nowrap;
    }
    .btn:hover { background:rgba(143,175,110,0.2); border-color:rgba(143,175,110,0.4); }
    .char-count { font-family:var(--font-mono); font-size:0.68rem; color:var(--sidebar-muted); margin-left:auto; }

    /* Examples */
    .examples-label { font-family:var(--font-mono); font-size:0.67rem; color:var(--sidebar-muted); letter-spacing:0.1em; text-transform:uppercase; margin:1.25rem 0 0.5rem; }
    .examples { display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:1.75rem; }
    .example-chip {
      font-family:var(--font-mono); font-size:0.72rem; color:var(--sidebar-muted);
      background:rgba(143,175,110,0.06); border:1px solid rgba(143,175,110,0.12);
      border-radius:20px; padding:0.25rem 0.7rem; cursor:pointer; transition:color 0.15s, border-color 0.15s, background 0.15s;
    }
    .example-chip:hover { color:var(--moss-light); border-color:rgba(143,175,110,0.3); background:rgba(143,175,110,0.1); }

    /* Results */
    #results { margin-top:0; }
    .dork-card {
      background:#141a10; border:1px solid rgba(143,175,110,0.14); border-radius:8px;
      padding:1rem 1.1rem; margin-bottom:0.85rem;
    }
    .dork-card-label { font-family:var(--font-mono); font-size:0.65rem; color:var(--sidebar-muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:0.6rem; }
    .dork-string {
      font-family:var(--font-mono); font-size:0.88rem; color:var(--moss-light);
      background:rgba(0,0,0,0.35); border:1px solid rgba(143,175,110,0.1); border-radius:5px;
      padding:0.55rem 0.8rem; word-break:break-all; line-height:1.6; margin-bottom:0.7rem;
      cursor:pointer; transition:border-color 0.15s;
      user-select:all;
    }
    .dork-string:hover { border-color:rgba(143,175,110,0.3); }
    .dork-actions { display:flex; gap:0.5rem; flex-wrap:wrap; }
    .dork-link {
      font-family:var(--font-mono); font-size:0.72rem; padding:0.3rem 0.7rem;
      border-radius:5px; text-decoration:none; transition:background 0.15s, color 0.15s;
      border:1px solid rgba(143,175,110,0.15); color:var(--sidebar-muted);
    }
    .dork-link:hover { background:rgba(143,175,110,0.1); color:var(--moss-light); border-color:rgba(143,175,110,0.3); }
    .copy-btn {
      font-family:var(--font-mono); font-size:0.72rem; padding:0.3rem 0.7rem;
      border-radius:5px; background:transparent; cursor:pointer;
      border:1px solid rgba(143,175,110,0.15); color:var(--sidebar-muted);
      transition:background 0.15s, color 0.15s; margin-left:auto;
    }
    .copy-btn:hover { background:rgba(143,175,110,0.1); color:var(--moss-light); }

    .msg { font-family:var(--font-mono); font-size:0.8rem; color:var(--sidebar-muted); padding:0.5rem 0; }

    #auth-gate { position:fixed; inset:0; z-index:9999; background:#0a0e08; }
    #auth-gate.hidden { display:none; }
  </style>
</head>
<body>

<div id="auth-gate"></div>

<div id="void-bar">
  <a href="/void/">← void</a>
  <span id="void-label">dork builder</span>
</div>

<div id="page">
  <div class="page-title">// google dork generator</div>

  <textarea id="query-area" placeholder="Describe what you want to find in plain English…&#10;e.g. find admin login pages on tesla.com" rows="3"></textarea>
  <div class="action-row">
    <button class="btn" id="gen-btn">Generate Dorks</button>
    <span class="char-count" id="char-count">0 chars</span>
  </div>

  <div class="examples-label">// try these</div>
  <div class="examples" id="examples"></div>

  <div id="results"></div>
</div>

<script>
(function () {
  if (sessionStorage.getItem('void_auth') !== '1') {
    window.location.replace('/projects/');
    return;
  }
  document.getElementById('auth-gate').classList.add('hidden');

  const queryArea = document.getElementById('query-area');
  const genBtn    = document.getElementById('gen-btn');
  const charCount = document.getElementById('char-count');
  const results   = document.getElementById('results');

  const EXAMPLES = [
    'find admin login pages on apple.com',
    'exposed config files with API keys',
    'PDF reports from nasa.gov',
    'open directory listings with zip files',
    'webcams and CCTV systems online',
    'find John Smith on social media',
    'emails and staff directory for spacex.com',
    'database dump files exposed',
    'PHP debug error pages',
    'find subdomains of google.com',
    'backup files on microsoft.com',
    'exposed .env files with passwords',
  ];

  // Render example chips
  const exDiv = document.getElementById('examples');
  EXAMPLES.forEach(ex => {
    const chip = document.createElement('span');
    chip.className = 'example-chip';
    chip.textContent = ex;
    chip.addEventListener('click', () => {
      queryArea.value = ex;
      charCount.textContent = `${ex.length} chars`;
      generate();
    });
    exDiv.appendChild(chip);
  });

  queryArea.addEventListener('input', () => {
    charCount.textContent = `${queryArea.value.length} chars`;
  });
  queryArea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
  });
  genBtn.addEventListener('click', generate);

  function generate() {
    const q = queryArea.value.trim();
    if (!q) return;
    const dorks = buildDorks(q);
    if (!dorks.length) {
      results.innerHTML = '<div class="msg">Could not parse intent — try being more specific.</div>';
      return;
    }
    results.innerHTML = dorks.map(d => dorkCard(d)).join('');
  }

  function dorkCard({ label, dork }) {
    const qs   = encodeURIComponent(dork);
    const gUrl = `https://www.google.com/search?q=${qs}`;
    const bUrl = `https://www.bing.com/search?q=${qs}`;
    const dUrl = `https://duckduckgo.com/?q=${qs}`;
    const id   = 'dk_' + Math.random().toString(36).slice(2);
    return `
      <div class="dork-card">
        <div class="dork-card-label">${esc(label)}</div>
        <div class="dork-string" id="${id}" title="Click to select all">${esc(dork)}</div>
        <div class="dork-actions">
          <a class="dork-link" href="${gUrl}" target="_blank" rel="noopener">Google ↗</a>
          <a class="dork-link" href="${bUrl}" target="_blank" rel="noopener">Bing ↗</a>
          <a class="dork-link" href="${dUrl}" target="_blank" rel="noopener">DuckDuckGo ↗</a>
          <button class="copy-btn" onclick="copyDork('${id}', this)">Copy</button>
        </div>
      </div>`;
  }

  window.copyDork = function(id, btn) {
    const text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  };

  // ── Dork generation engine ───────────────────────────────
  function buildDorks(query) {
    const q = query.toLowerCase();
    const dorks = [];

    // Extract components
    const domainMatch = query.match(/\b([a-z0-9][a-z0-9-]*\.[a-z]{2,}(?:\.[a-z]{2})?)\b/i);
    const domain = domainMatch ? domainMatch[0].toLowerCase() : null;

    const quotedMatch = query.match(/"([^"]+)"/);
    const quoted = quotedMatch ? quotedMatch[1] : null;

    const nameMatch = query.match(/\b([A-Z][a-z]{1,15})\s+([A-Z][a-z]{1,20})\b/);
    const name = nameMatch ? nameMatch[0] : null;

    const site = domain ? `site:${domain} ` : '';

    // ── Intents ──────────────────────────────────────────────

    // Login / admin
    if (/\b(login|signin|sign.in|admin|panel|dashboard|portal|backend|cms|control.panel|cpanel)\b/.test(q)) {
      dorks.push({ label: 'Login & Admin Panels', dork: `${site}inurl:login OR inurl:admin OR inurl:panel OR inurl:dashboard OR inurl:signin` });
      dorks.push({ label: 'Admin Page Titles', dork: `${site}intitle:"admin" OR intitle:"administrator" OR intitle:"control panel" OR intitle:"login"` });
    }

    // Credentials / secrets
    if (/\b(password|passwd|credential|secret|api.?key|token|env|\.env|config)\b/.test(q)) {
      dorks.push({ label: 'Exposed .env / Config Files', dork: `${site}filetype:env "DB_PASSWORD" OR "APP_SECRET" OR "API_KEY" OR "SECRET_KEY"` });
      dorks.push({ label: 'Plaintext Credential Files', dork: `${site}ext:txt OR ext:log "password" OR "username" OR "api_key" OR "secret"` });
      dorks.push({ label: 'Exposed Config Files', dork: `${site}ext:cfg OR ext:conf OR ext:ini -"sample" -"example" -"template"` });
    }

    // File types
    const fileTypeMap = { pdf:'pdf', 'xls|xlsx|excel|spreadsheet':'xls', 'doc|docx|word':'doc', 'ppt|pptx|powerpoint|presentation':'ppt', 'csv':'csv', 'zip|archive':'zip', 'sql|database|dump':'sql' };
    for (const [pattern, ext] of Object.entries(fileTypeMap)) {
      if (new RegExp(`\\b(${pattern})\\b`).test(q)) {
        dorks.push({ label: `${ext.toUpperCase()} Documents`, dork: `${site}filetype:${ext}` });
        break;
      }
    }

    // Open directories
    if (/\b(index|directory|listing|open.?dir|exposed|public.files|file.?listing)\b/.test(q)) {
      dorks.push({ label: 'Open Directory Listings', dork: `${site}intitle:"Index of" OR intitle:"Directory listing" -"parent directory"` });
      dorks.push({ label: 'Open Dir with Archive Files', dork: `${site}intitle:"Index of /" ext:zip OR ext:tar OR ext:gz OR ext:bak` });
    }

    // Cameras / IoT
    if (/\b(camera|webcam|cctv|live.?view|surveillance|ip.?cam|nvr|dvr)\b/.test(q)) {
      dorks.push({ label: 'AXIS / Generic IP Cameras', dork: `intitle:"Live View / - AXIS" OR intitle:"webcam" OR inurl:"MultiCameraFrame?Mode=Motion"` });
      dorks.push({ label: 'Open CCTV / NVR Panels', dork: `intitle:"DVR" inurl:8080 OR intitle:"Network Camera" inurl:view OR inurl:"view/index.shtml"` });
      if (domain) dorks.push({ label: `Camera Feeds on ${domain}`, dork: `site:${domain} inurl:cam OR inurl:video OR inurl:feed OR inurl:stream` });
    }

    // Social / people search
    if (/\b(social|profile|linkedin|twitter|facebook|instagram|tiktok|reddit)\b/.test(q) || name || quoted) {
      const target = quoted || name;
      if (target) {
        dorks.push({ label: 'Social Media Profiles', dork: `"${target}" site:linkedin.com OR site:twitter.com OR site:facebook.com OR site:instagram.com` });
        dorks.push({ label: 'General Profile Search', dork: `"${target}" inurl:profile OR inurl:user OR inurl:about` });
      } else if (domain) {
        dorks.push({ label: 'Company Social Profiles', dork: `"${domain.replace(/\.[^.]+$/, '')}" site:linkedin.com OR site:twitter.com OR site:crunchbase.com` });
      }
    }

    // Emails / directory
    if (/\b(email|mail|contact|directory|staff|employee|phone)\b/.test(q)) {
      if (domain) {
        dorks.push({ label: `Email Addresses for ${domain}`, dork: `"@${domain}" contact OR email OR staff OR team OR directory` });
        dorks.push({ label: 'Staff / Team Pages', dork: `site:${domain} inurl:team OR inurl:staff OR inurl:contact OR inurl:about` });
      } else {
        dorks.push({ label: 'Email in Documents', dork: `filetype:pdf OR filetype:doc OR filetype:xls "email" OR "@gmail.com" OR "@yahoo.com"` });
      }
    }

    // Subdomains
    if (/\b(subdomain|subdomains)\b/.test(q) && domain) {
      dorks.push({ label: `Subdomains of ${domain}`, dork: `site:*.${domain} -www.${domain}` });
    }

    // Database / backup files
    if (/\b(backup|dump|database|sql|mysql|db.?file)\b/.test(q)) {
      dorks.push({ label: 'Database Dump Files', dork: `${site}ext:sql OR ext:dump "DROP TABLE" OR "INSERT INTO" OR "CREATE TABLE"` });
      dorks.push({ label: 'Backup Archives', dork: `${site}ext:bak OR ext:old OR ext:backup -inurl:blog inurl:backup OR inurl:dump OR inurl:archive` });
    }

    // Debug / error pages
    if (/\b(error|exception|debug|stack.?trace|verbose|php.?info|phpinfo)\b/.test(q)) {
      dorks.push({ label: 'PHP Debug / Error Pages', dork: `${site}intitle:"phpinfo()" intext:"PHP Version" OR intext:"php.ini"` });
      dorks.push({ label: 'Verbose Error Output', dork: `${site}intext:"Fatal error" OR intext:"stack trace" OR intext:"Uncaught exception"` });
    }

    // Juicy files
    if (/\b(git|\.git|source.?code|repo|repository)\b/.test(q)) {
      dorks.push({ label: 'Exposed .git Directories', dork: `${site}intitle:"Index of /.git" OR inurl:"/.git/config"` });
    }

    // Generic fallback
    if (dorks.length === 0) {
      const stopWords = new Set(['find','search','show','get','look','for','the','and','or','in','on','at','a','an','is','are','about','from','with','that','what','how','when','where','who','want','to','me','give','list']);
      const words = query.trim().split(/\s+/)
        .filter(w => !stopWords.has(w.toLowerCase()) && w.length > 2 && !w.match(/\.(com|net|org|io|gov)$/i))
        .map(w => w.replace(/[^a-zA-Z0-9"'_-]/g, ''))
        .filter(Boolean);

      const kw = words.join(' ').trim() || query.trim();
      if (domain) {
        dorks.push({ label: 'Site Keyword Search', dork: `site:${domain} ${kw}` });
      }
      dorks.push({ label: 'General Dork', dork: `"${kw}"` });
      if (name || quoted) {
        const t = quoted || name;
        dorks.push({ label: 'Exact Name / Phrase', dork: `"${t}" -site:facebook.com -site:twitter.com` });
      }
    }

    return dorks;
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
})();
</script>
</body>
</html>
